services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: ghost
      POSTGRES_DB: ghost
    ports:
      - "5432:5432"

  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
